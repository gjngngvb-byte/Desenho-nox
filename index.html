    <script>

        // Carregar Ficheiro e Definir Nome Automático
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];

            // Extrai o nome do ficheiro sem extensão

            // Reseta Transformações

            transformRotate.value = "0";
            transformX.value = "0";
            transformY.value = "0";
            isFlipX = false; isFlipY = false;

                placeholderText.classList.add('hidden');
                previewCanvas.classList.remove('hidden');
                fullscreenBtn.classList.remove('hidden');
                generateZipBtn.disabled = false;
                generateJsBtn.disabled = false;
                updateBtn.disabled = false;
                
                processImage();
                URL.revokeObjectURL(url);
            };
            img.src = url;

        function getBrightness(imgData, w, h, x, y) {
            if (x < 0 || x >= w || y < 0 || y >= h) return 255;
            const idx = (y * w + x) * 4;
            return (imgData[idx] * 0.299 + imgData[idx + 1] * 0.587 + imgData[idx + 2] * 0.114);
        }

        // --- FUNÇÕES AUXILIARES DE DESENHO ---
        function createZigzag(x1, y1, x2, y2, frequency, amplitude) {
            const points = [];
            const dx = x2 - x1, dy = y2 - y1;
            const distance = Math.sqrt(dx*dx + dy*dy);
            const steps = Math.max(2, Math.floor(distance / frequency));
            const ux = dx / distance, uy = dy / distance; // Vetor unitário
            const perpX = -uy, perpY = ux; // Vetor perpendicular

            for(let i = 0; i <= steps; i++) {
                const t = i / steps;
                const currentX = x1 + dx * t;
                const currentY = y1 + dy * t;
                const offset = (i % 2 === 0 ? 1 : -1) * amplitude;
                points.push({
                    x: currentX + perpX * offset,
                    y: currentY + perpY * offset
                });
            }
            return points;
        }

        function createIrregularLine(x1, y1, x2, y2, roughness) {
            const points = [];
            const dx = x2 - x1, dy = y2 - y1;
            const distance = Math.sqrt(dx*dx + dy*dy);
            const steps = Math.max(2, Math.floor(distance / 10));
            
            points.push({x: x1, y: y1});
            for(let i = 1; i < steps; i++) {
                const t = i / steps;
                const currentX = x1 + dx * t;
                const currentY = y1 + dy * t;
                const rx = (Math.random() - 0.5) * roughness;
                const ry = (Math.random() - 0.5) * roughness;
                points.push({x: currentX + rx, y: currentY + ry});
            }
            points.push({x: x2, y: y2});
            return points;
        }

        function createHandDrawnHatch(x, y, cellSize, density, roughness) {
            const paths = [];
            const numLines = Math.floor(density * cellSize / 2); // Densidade varia número de linhas

            for(let i = 0; i < numLines; i++) {
                const startX = x + Math.random() * cellSize;
                const startY = y + Math.random() * cellSize;
                const length = cellSize * (0.5 + Math.random()); // Comprimento variável
                const angle = (Math.random() - 0.5) * Math.PI + (Math.PI/4); // Ângulo principal + variação
                const endX = startX + Math.cos(angle) * length;
                const endY = startY + Math.sin(angle) * length;

                // Adiciona uma ligeira curva ou "barriga" na linha
                const midX = (startX + endX) / 2 + (Math.random() - 0.5) * roughness;
                const midY = (startY + endY) / 2 + (Math.random() - 0.5) * roughness;
                
                // Aproximação de curva quadrática com 3 pontos
                paths.push({ layer: 2, points: [{x: startX, y: startY}, {x: midX, y: midY}, {x: endX, y: endY}] });
            }
            return paths;
        }

        function createSmoothPath(points, tension) {
            if (points.length < 3) return points;
            const smoothedPoints = [];
            // Implementação simples de Catmull-Rom Spline ou similar (simplificada)
            // Para o Auto.js, que lê segmentos retos, a "suavização" aqui significa
            // adicionar mais pontos intermédios que formam visualmente uma curva.
            for (let i = 0; i < points.length - 1; i++) {
                const p0 = points[Math.max(0, i-1)];
                const p1 = points[i];
                const p2 = points[i+1];
                const p3 = points[Math.min(points.length-1, i+2)];

                for(let t = 0; t < 1; t+=0.2) { // 5 segmentos por ponto original
                    const tt = t*t, ttt = tt*t;
                    const q1 = -ttt + 2*tt - t;
                    const q2 = 3*ttt - 5*tt + 2;
                    const q3 = -3*ttt + 4*tt + t;
                    const q4 = ttt - tt;
                    const tx = 0.5 * (p0.x*q1 + p1.x*q2 + p2.x*q3 + p3.x*q4);
                    const ty = 0.5 * (p0.y*q1 + p1.y*q2 + p2.y*q3 + p3.y*q4);
                    smoothedPoints.push({x: tx, y: ty});
                }
            }
            smoothedPoints.push(points[points.length-1]);
            return smoothedPoints;
        }

        // --- MOTOR DE PROCESSAMENTO ---
        function processImage() {
            if (!originalImage) return;

            const hiddenCanvas = document.createElement('canvas');
            const ctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
            
            const resX = parseInt(resXInput.value) || 1100;
            const resY = parseInt(resYInput.value) || 2442;
            const cellSize = parseInt(cellSizeInput.value) || 12;
            const style = hatchStyleSelect.value;
            
            // Valores de Transformação
            const scalePct = (parseFloat(transformScale.value) || 100) / 100;
            const rotateDeg = parseFloat(transformRotate.value) || 0;
            const mvX = parseFloat(transformX.value) || 0;
            const mvY = parseFloat(transformY.value) || 0;

            hiddenCanvas.width = resX; hiddenCanvas.height = resY;
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, resX, resY);
            
            ctx.save();
            const centerX = (resX / 2) + mvX;
            const centerY = (resY / 2) + mvY;
            ctx.translate(centerX, centerY);
            ctx.rotate(rotateDeg * Math.PI / 180);
            ctx.scale(isFlipX ? -1 : 1, isFlipY ? -1 : 1);
            
            const usableWidth = resX * 0.9; const usableHeight = resY * 0.8;
            const baseScale = Math.min(usableWidth / originalImage.width, usableHeight / originalImage.height);
            const finalScale = baseScale * scalePct;

            ctx.scale(finalScale, finalScale);
            ctx.drawImage(originalImage, -originalImage.width / 2, -originalImage.height / 2);
            ctx.restore();

            const imgData = ctx.getImageData(0, 0, resX, resY).data;
            finalScriptPaths = [];
            
            const addSegment = (layerIdx, x1, y1, x2, y2) => {
                finalScriptPaths.push({ layer: layerIdx, points: [{x: x1, y: y1}, {x: x2, y: y2}] });
            };
            const addPolyline = (layerIdx, points) => {
                if(points && points.length >= 2) finalScriptPaths.push({ layer: layerIdx, points: points });
            };

            // BoundBox Calculation

            }

            let targetTimeMs = (mins * 60 + secs) * 1000; if(targetTimeMs < 1000 && targetTimeMs !== 0) targetTimeMs = 1000; 

            let estimatedPoints = finalScriptPaths.reduce((sum, p) => sum + p.points.length, 0);
            let interpolador = 5; // Valor base menor para ser mais fiel aos novos estilos
            if (targetTimeMs > 0 && targetTimeMs / estimatedPoints < 10) interpolador = 15; // Aumenta interpolação se o tempo for curto

                    for (let i = 1; i <= steps; i++) {
                        actions.push({ type: 'move', x: p1.x + (p2.x - p1.x) * (i/steps), y: p1.y + (p2.y - p1.y) * (i/steps) });

                actions.push({ type: 'up', x: pts[pts.length-1].x, y: pts[pts.length-1].y });
            }
            const timeStep = (actions.length > 0 && targetTimeMs > 0) ? targetTimeMs / actions.length : 15;
            let currentTimeMs = 1500;
